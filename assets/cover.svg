<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="cardMine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="cardTheirs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- pitch lines, playful/faint -->
  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="2" fill="none">
    <circle cx="600" cy="200" r="120"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
  </g>

  <!-- confetti dots -->
  <g fill="#ffffff" fill-opacity="0.5">
    <circle cx="90" cy="70" r="4"/>
    <circle cx="150" cy="130" r="3"/>
    <circle cx="1080" cy="90" r="4"/>
    <circle cx="1040" cy="300" r="3"/>
    <circle cx="200" cy="330" r="3"/>
    <circle cx="1000" cy="60" r="3"/>
  </g>
  <g fill="#fbbf24">
    <circle cx="120" cy="260" r="4"/>
    <circle cx="1120" cy="200" r="4"/>
  </g>

  <!-- MINE card (left, tilted) -->
  <g transform="translate(300,200) rotate(-8)" filter="url(#soft)">
    <rect x="-110" y="-140" width="220" height="280" rx="18" fill="url(#cardMine)"/>
    <rect x="-90" y="-116" width="180" height="120" rx="10" fill="#ffffff" fill-opacity="0.35"/>
    <circle cx="0" cy="-56" r="34" fill="#ffffff"/>
    <path d="M-16,-66 L16,-66 L20,-56 L10,-44 L-10,-44 L-20,-56 Z" fill="#065f46"/>
    <text x="0" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="26" fill="#1f2937">MAR 15</text>
    <text x="0" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="15" fill="#78350f" letter-spacing="2">MINE</text>
  </g>

  <!-- THEIRS card (right, tilted) -->
  <g transform="translate(900,200) rotate(8)" filter="url(#soft)">
    <rect x="-110" y="-140" width="220" height="280" rx="18" fill="url(#cardTheirs)"/>
    <rect x="-90" y="-116" width="180" height="120" rx="10" fill="#ffffff" fill-opacity="0.35"/>
    <circle cx="0" cy="-56" r="34" fill="#ffffff"/>
    <path d="M-16,-66 L16,-66 L20,-56 L10,-44 L-10,-44 L-20,-56 Z" fill="#1e3a8a"/>
    <text x="0" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="26" fill="#1f2937">GER 9</text>
    <text x="0" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="15" fill="#1e3a8a" letter-spacing="2">THEIRS</text>
  </g>

  <!-- swap arrows in the middle -->
  <g transform="translate(600,200)" stroke="#fefce8" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M-70,-24 H70" />
    <path d="M50,-40 L70,-24 L50,-8" />
    <path d="M70,24 H-70" />
    <path d="M-50,8 L-70,24 L-50,40" />
  </g>

  <!-- little match badge -->
  <g transform="translate(600,132)">
    <circle r="26" fill="#22c55e"/>
    <path d="M-11,0 L-3,9 L12,-10" stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- title -->
  <text x="600" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="40" fill="#ffffff">panini-diff</text>
</svg>
